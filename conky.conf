conky.config = {
    own_window_transparent = true,        -- Makes the Conky window transparent
    own_window_argb_visual = true,        -- Enables ARGB visuals for transparency support
    own_window_argb_value = 150,          -- Sets the level of window opacity (0-255, where 0 is fully transparent)
    draw_shades = false,                  -- Disables shadows under text
    draw_outline = false,                 -- Disables text outline
    draw_borders = false,                 -- Disables window borders in Conky
    draw_graph_borders = false,           -- Disables borders around graphs
    default_color = '#E0E0E0',            -- Sets the default color for text
    default_shade_color = '#000000',      -- Sets the default color for text shadows (not used because shadows are disabled)
    default_outline_color = '#000000',    -- Sets the default color for text outline (not used because outline is disabled)
    gap_x = 1,                            -- Horizontal gap between the widget and the screen edge
    gap_y = 50,                           -- Vertical gap between the widget and the screen edge
    minimum_width = 660,                  -- Minimum width of the Conky window
    border_inner_margin = 20,             -- Inner margin for the Conky window border
    border_outer_margin = 0,              -- Outer margin for the Conky window border
    no_buffers = true,                    -- Ignores system buffers when displaying memory usage
    cpu_avg_samples = 2,                  -- Number of samples to average CPU usage
    net_avg_samples = 2,                  -- Number of samples to average network speed
    override_utf8_locale = true,          -- Forces the use of UTF-8 encoding
    use_spacer = 'right',                 -- Adds spacing to align text to the right
    uppercase = false,                    -- Does not convert text to uppercase
    color1 = '#E0E0E0',                   -- Primary color used for text and titles
    color2 = '#E0E0E0',                   -- Secondary color used for subtitles and labels
    color3 = '#88B04B',                   -- Third color (used in log sections)
    color4 = '#FFD700',                   -- Fourth color (not used in this file)
    color5 = '#A64DFF',                   -- Fifth color used for separators
};

conky.text = [[
${color1}${font Menlo:bold:size=14}Server Status${font}
${color5}${hr 4}                         -- Colored separator line under the title

${font Menlo:size=12}${color2}Uptime ${goto 270}${uptime} -- Displays system uptime
${font Menlo:size=12}${color2}CPU Usage ${goto 270}${cpu}% ${goto 310}${color1}${cpubar 5,350} -- Displays CPU usage and a progress bar
${font Menlo:size=12}${color2}RAM Usage ${goto 270}${exec ~/.config/conky/format_ram.sh} ${goto 450}${color1}${membar 5,210} -- Displays RAM usage via a custom script
${font Menlo:size=12}${color2}Disk Usage ${goto 270}${fs_used /} / ${fs_size /} (${fs_used_perc /}%) ${goto 477}${color1}${fs_bar 5,183 /} -- Displays disk usage
${font Menlo:size=12}${color2}Swap Usage ${goto 270}${swap} / ${swapmax} (${swapperc}%) ${goto 440}${color1}${swapbar 5,220} -- Displays swap usage
${font Menlo:size=12}${color2}Download/Upload:${goto 270}${execi 5 /home/user/vnstat_and_ifstat_stats.sh} -- Displays download and upload stats via an external script
${font Menlo:size=12}${color2}Network Latency ${goto 270}${color}${execi 300 ping -c 3 8.8.8.8 | tail -1 | awk '{print $4}' | cut -d '/' -f 2}ms -- Displays network latency by pinging Google DNS

-- Displays CPU, SSD, ACPI, and Wi-Fi temperatures
${font Menlo:size=12}${color2}CPU Temperature ${goto 270}${execi 10 sensors | awk '/Core [0-9]+/ {sum += $3; count++} END {printf "%.1f°C", int(sum/count)}'}
${font Menlo:size=12}${color2}SSD Temperature ${goto 270}${execi 10 sudo /usr/sbin/nvme smart-log /dev/nvme0 | grep temperature | awk '{printf "%.1f°C", $3+0.0}'}
${font Menlo:size=12}${color2}ACPI Temperature ${goto 270}${execi 10 sensors -u | awk '/acpitz-acpi-0/,/^$/' | grep 'temp1_input' | awk '{printf "%.1f°C", $2+0.0}'}
${font Menlo:size=12}${color2}Wi-Fi Temperature ${goto 270}${execi 10 sensors -u | awk '/iwlwifi_1-virtual-0/,/^$/' | grep 'temp1_input' | awk '{printf "%.1f°C", $2}'}

-- Checks the status of Geth, Lighthouse Beacon, and Validator services
${font Menlo:size=12}${color2}Geth Service ${goto 270}${if_match "${execi 60 systemctl is-active geth.service}"=="active"}${color #00cc44}✓ Active${else}${color red}✗ Inactive${endif}${color}
${font Menlo:size=12}${color2}Lighthouse Beacon ${goto 270}${if_match "${execi 60 systemctl is-active lighthouse-beacon.service}"=="active"}${color #00cc44}✓ Active${else}${color red}✗ Inactive${endif}${color}
${font Menlo:size=12}${color2}Lighthouse Validator ${goto 270}${if_match "${execi 60 systemctl is-active lighthouse-validator.service}"=="active"}${color #00cc44}✓ Active${else}${color red}✗ Inactive${endif}${color}

-- Checks the synchronization status of the validator and the number of active validators
${font Menlo:size=12}${color2}Validator Status ${goto 270}${if_match "${execi 60 curl -s http://localhost:8545 -X POST -H "Content-Type: application/json" --data '{"jsonrpc":"2.0","method":"eth_syncing","params":[],"id":1}' | jq -r '.result'}"=="false"}${color #00cc44}✓ Synced${else}${color red}✗ Not Synced${endif}${color}
${font Menlo:size=12}${color2}Active Validators ${goto 270}${color}${if_match "${execi 60 /home/user/validator_count.sh}"!="0"}${color #00cc44}${else}${color red}${endif}${execi 60 /home/user/validator_count.sh}${color}

-- Displays recent logs from Lighthouse Beacon, Validator, and Geth services
${color1}${font Menlo:bold:size=14}Lighthouse Beacon Logs${font}
${color5}${hr 4}
${color2}${execpi 1 journalctl -u lighthouse-beacon.service --no-pager -n 5 | fold -w 70 | head -n 10}

${color1}${font Menlo:bold:size=14}Lighthouse Validator Logs${font}
${color5}${hr 4}
${color2}${execpi 1 journalctl -u lighthouse-validator.service --no-pager -n 5 | fold -w 70 | head -n 10}

${color1}${font Menlo:bold:size=14}Geth Logs${font}
${color5}${hr 4}
${color2}${execpi 1 journalctl -u geth.service --no-pager -n 5 | fold -w 70 | head -n 10}

-- Displays PLS balance and the last increase in balance
${color1}${font Menlo:bold:size=14}PLS Balance${font}
${color5}${hr 4}
${font Menlo:size=12}${color #E0E0E0}PLS Balance${goto 270}${execi 300 python3 /home/user/pulsechain_balance.py | sed -n 1p} PLS
${font Menlo:size=12}${color lightgrey}Last Increase${goto 270}${color 00cc44}${execi 300 python3 /home/user/pulsechain_balance.py | sed -n 2p}${color}
]]
